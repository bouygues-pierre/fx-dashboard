<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="refresh" content="120">
<title>FX Bot - Forward test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0b0e14;--card:#141925;--card2:#1b2230;--line:#222b3a;--tx:#e6edf3;--mut:#8b97a8;
--pos:#3fb950;--neg:#f85149;--warn:#d29922;--acc:#4c8dff}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;padding:24px;max-width:1280px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.top h1{font-size:20px;font-weight:650}.top h1 span{color:var(--acc)}
.live{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:13px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--pos);animation:p 2s infinite}
@keyframes p{0%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}70%{box-shadow:0 0 0 7px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.kpi .l{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.6px}
.kpi .v{font-size:26px;font-weight:680;margin-top:6px}.kpi .u{font-size:14px;color:var(--mut);font-weight:500;margin-left:3px}
.pos{color:var(--pos)}.neg{color:var(--neg)}.warn{color:var(--warn)}
.grid{display:grid;gap:14px;grid-template-columns:repeat(12,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.card h3{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;font-weight:600}
.c8{grid-column:span 8}.c6{grid-column:span 6}.c4{grid-column:span 4}.c12{grid-column:span 12}
@media(max-width:900px){.c8,.c6,.c4{grid-column:span 12}}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:right;padding:7px 8px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase}td:first-child,th:first-child{text-align:left}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bpos{background:rgba(63,185,80,.15);color:var(--pos)}.bneg{background:rgba(248,81,73,.15);color:var(--neg)}
.tag{padding:1px 7px;border-radius:6px;font-size:11px;background:#222b3a;color:var(--mut)}
.exec{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mini{text-align:center;padding:10px;background:var(--card2);border-radius:12px}.mini .v{font-size:22px;font-weight:680}.mini .l{font-size:11px;color:var(--mut)}
.empty{color:var(--mut);font-size:13px;padding:20px;text-align:center}
canvas{max-height:300px}
</style></head><body>
<div class="top"><h1>FX Bot - <span>Forward test</span></h1>
<div class="live"><span class="dot"></span>MAJ 2026-07-03 05:45:07 - auto-refresh 120s</div></div>
<div class="kpis" id="kpis"></div>
<div id="today"></div>
<div class="grid">
  <div class="card c8"><h3>Courbe d'equite</h3><canvas id="eq"></canvas></div>
  <div class="card c4"><h3>Drawdown</h3><canvas id="dd"></canvas></div>
  <div class="card c4"><h3>PnL par paire</h3><canvas id="pair"></canvas></div>
  <div class="card c4"><h3>Long / Short</h3><canvas id="dir"></canvas></div>
  <div class="card c4"><h3>Distribution R</h3><canvas id="rh"></canvas><div id="rh_e" class="empty" style="display:none">R indisponible</div></div>
  <div class="card c6"><h3>Par session</h3><div id="sess"></div></div>
  <div class="card c6"><h3>Qualite d'execution</h3><div id="exec"></div></div>
  <div class="card c6"><h3>PnL quotidien</h3><canvas id="dpnl"></canvas></div>
  <div class="card c6"><h3>Win rate glissant (20 trades)</h3><canvas id="rwr"></canvas></div>
  <div class="card c12"><h3>Trades recents</h3><div id="recent"></div></div>
</div>
<script>const D={"kpis": [{"label": "Balance", "value": "100,000", "unit": "USD", "tone": "neutral"}, {"label": "PnL net", "value": "+0", "unit": "USD", "tone": "pos"}, {"label": "Rendement", "value": "+0.0", "unit": "%", "tone": "pos"}, {"label": "Trades", "value": "0", "unit": "", "tone": "neutral"}, {"label": "Win rate", "value": "0", "unit": "%", "tone": "warn"}, {"label": "Profit Factor", "value": "0.00", "unit": "", "tone": "neg"}, {"label": "Max Drawdown", "value": "0.0", "unit": "%", "tone": "neg"}, {"label": "Esperance/trade", "value": "+0.0", "unit": "USD", "tone": "pos"}], "equity": [], "drawdown": [], "by_pair": [], "by_dir": [], "by_session": [], "r_hist": null, "recent": [], "currency": "USD", "streak": 0, "streak_win": false, "daily": [], "last_day": null, "roll_wr": [], "exec": null};
const cur=D.currency,neg='#f85149',pos='#3fb950',acc='#4c8dff',mut='#8b97a8',line='#222b3a';
Chart.defaults.color=mut;Chart.defaults.borderColor=line;
const K=document.getElementById('kpis');D.kpis.forEach(k=>{K.insertAdjacentHTML('beforeend',
 `<div class="kpi"><div class="l">${k.label}</div><div class="v ${k.tone}">${k.value}<span class="u">${k.unit}</span></div></div>`)});
function grad(ctx,c){const g=ctx.createLinearGradient(0,0,0,300);g.addColorStop(0,c+'55');g.addColorStop(1,c+'00');return g}
if(D.equity.length){
new Chart(eq,{type:'line',data:{labels:D.equity.map(p=>p.t),datasets:[{data:D.equity.map(p=>p.v),
 borderColor:acc,backgroundColor:c=>grad(c.chart.ctx,acc),fill:true,tension:.25,pointRadius:0,borderWidth:2}]},
 options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{grid:{color:line}}},interaction:{intersect:false,mode:'index'}}});
new Chart(dd,{type:'line',data:{labels:D.drawdown.map(p=>p.t),datasets:[{data:D.drawdown.map(p=>p.v),
 borderColor:neg,backgroundColor:c=>grad(c.chart.ctx,neg),fill:true,tension:.2,pointRadius:0,borderWidth:1.5}]},
 options:{plugins:{legend:{display:false}},scales:{x:{display:false}}}});
}
const bp=D.by_pair;if(bp.length)new Chart(pair,{type:'bar',data:{labels:bp.map(p=>p.k),datasets:[{data:bp.map(p=>p.pnl),
 backgroundColor:bp.map(p=>p.pnl>=0?pos:neg),borderRadius:5}]},options:{plugins:{legend:{display:false}},indexAxis:'y'}});
const bd=D.by_dir;if(bd.length)new Chart(dir,{type:'doughnut',data:{labels:bd.map(p=>p.k),datasets:[{data:bd.map(p=>Math.abs(p.pnl)),
 backgroundColor:[acc,'#a371f7','#d29922']}]},options:{cutout:'62%',plugins:{legend:{position:'bottom'}}}});
if(D.r_hist){new Chart(rh,{type:'bar',data:{labels:D.r_hist.labels,datasets:[{data:D.r_hist.counts,
 backgroundColor:D.r_hist.labels.map(l=>parseFloat(l)>=0?pos:neg),borderRadius:3}]},options:{plugins:{legend:{display:false}}}});}
else{rh.style.display='none';document.getElementById('rh_e').style.display='block';}
const T=D.last_day;document.getElementById('today').innerHTML=T?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:0 0 16px">
 <div class="kpi"><div class="l">Derniere journee</div><div class="v">${T.date}</div></div>
 <div class="kpi"><div class="l">PnL du jour</div><div class="v ${T.pnl>=0?'pos':'neg'}">${T.pnl>=0?'+':''}${T.pnl}<span class="u">${cur}</span></div></div>
 <div class="kpi"><div class="l">Trades du jour</div><div class="v">${T.n}</div></div>
 <div class="kpi"><div class="l">Win rate du jour</div><div class="v">${T.wr}<span class="u">%</span></div></div></div>`:'';
if(D.daily&&D.daily.length)new Chart(dpnl,{type:'bar',data:{labels:D.daily.map(p=>p.d),datasets:[{data:D.daily.map(p=>p.pnl),
 backgroundColor:D.daily.map(p=>p.pnl>=0?pos:neg),borderRadius:3}]},options:{plugins:{legend:{display:false}},scales:{x:{display:false}}}});
if(D.roll_wr&&D.roll_wr.length)new Chart(rwr,{type:'line',data:{labels:D.roll_wr.map(p=>p.t),datasets:[{data:D.roll_wr.map(p=>p.v),
 borderColor:'#eda100',backgroundColor:c=>grad(c.chart.ctx,'#eda100'),fill:true,tension:.3,pointRadius:0,borderWidth:1.5}]},
 options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{suggestedMin:0,suggestedMax:100,grid:{color:line}}}}});
function tbl(rows,cols){if(!rows.length)return '<div class="empty">Pas encore de donnees</div>';
 let h='<table><tr>'+cols.map(c=>`<th>${c[0]}</th>`).join('')+'</tr>';
 rows.forEach(r=>{h+='<tr>'+cols.map(c=>`<td>${c[1](r)}</td>`).join('')+'</tr>'});return h+'</table>'}
document.getElementById('sess').innerHTML=tbl(D.by_session,[['Session',r=>r.k],['Trades',r=>r.n],
 ['WR%',r=>r.wr],['PF',r=>`<span class="${r.pf>=1?'pos':'neg'}">${r.pf}</span>`],['PnL',r=>`<span class="${r.pnl>=0?'pos':'neg'}">${r.pnl}</span>`]]);
const E=D.exec;document.getElementById('exec').innerHTML=E? `<div class="exec">
 <div class="mini"><div class="v">${E.spread??'-'}</div><div class="l">Spread paye (pip)</div></div>
 <div class="mini"><div class="v">${E.slip??'-'}</div><div class="l">Slippage (pip)</div></div>
 <div class="mini"><div class="v">${E.gap??'-'}</div><div class="l">Gap vs backtest (pip)</div></div></div>
 <div class="empty" style="padding:8px">${E.n} fills loggés</div>`:'<div class="empty">Aucun log d\'execution encore</div>';
document.getElementById('recent').innerHTML=tbl(D.recent,[['Paire',r=>r.symbol],['Sens',r=>`<span class="tag">${r.dir}</span>`],
 ['Ouvert',r=>r.open],['Ferme',r=>r.close],['Score',r=>r.score??'-'],['Pips',r=>r.pips??'-'],['R',r=>r.R??'-'],
 ['PnL',r=>`<span class="badge ${r.pnl>=0?'bpos':'bneg'}">${r.pnl>=0?'+':''}${r.pnl} ${cur}</span>`]]);
</script></body></html>
